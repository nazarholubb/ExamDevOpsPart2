---
- name: Install Kubernetes, Minikube, and Helm
  hosts: all
  become: yes 
  gather_facts: yes
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install required dependencies
          apt:
            name:
              - curl
              - wget
              - apt-transport-https
              - ca-certificates
              - gnupg
              - conntrack
            state: present

    - name: Install Docker
      apt:
        name: docker.io  # Спробуємо ще раз, але додамо force_apt_get
        state: present
        update_cache: yes
        force_apt_get: yes

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Download and install Minikube
      get_url:
        url: https://storage.googleapis.com/minikube/releases/latest/minikube-linux-amd64
        dest: /usr/local/bin/minikube
        mode: '0755'

    - name: Download and install kubectl
      get_url:
        url: https://dl.k8s.io/release/v1.30.0/bin/linux/amd64/kubectl
        dest: /usr/local/bin/kubectl
        mode: '0755'

    - name: Download and install Helm
      shell: |
        curl -fsSL -o get_helm.sh https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
        chmod 700 get_helm.sh
        ./get_helm.sh
      args:
        creates: /usr/local/bin/helm # Не запускати скрипт, якщо helm вже встановлено