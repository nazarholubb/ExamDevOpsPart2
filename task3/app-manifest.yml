apiVersion: v1
kind: Namespace
metadata:
  name: ${ENV_NAME}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-app
  namespace: ${ENV_NAME}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devops-app
  template:
    metadata:
      labels:
        app: devops-app
    spec:
      containers:
        - name: app
          image: ${DOCKER_USER}/exam-app:${IMAGE_TAG}
          imagePullPolicy: Always
          ports:
            - containerPort: 8000 
---
apiVersion: v1
kind: Service
metadata:
  name: devops-app-svc
  namespace: ${ENV_NAME}
spec:
  selector:
    app: devops-app
  ports:
    - port: 8000
      targetPort: 8000