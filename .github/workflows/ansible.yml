name: "Ansible CI/CD (Task 2)"

on:
  workflow_run:
      workflows: ["Terraform CI/CD (Task 1)"] # НАЗВА МАЄ БУТИ ТАКА Ж, ЯК У ПЕРШОМУ ФАЙЛІ
      types:
        - completed
  workflow_dispatch: 
jobs:
  ansible:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    env:
      GOOGLE_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init

      - name: Get VM IP
        id: get_ip
        working-directory: ./terraform
        run: |
          VM_IP=$(terraform output -raw vm_ip)
          echo "VM_IP=$VM_IP" >> $GITHUB_ENV

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ env.VM_IP }} >> ~/.ssh/known_hosts

      - name: Ansible Pre-install Check
        run: |
          ansible-playbook task2/playbook.yml \
            -i "${{ env.VM_IP }}," \
            -u ubuntu \
            --private-key ~/.ssh/id_rsa \
            --ssh-common-args='-o StrictHostKeyChecking=no' \
            --check \
            --diff

      - name: Ansible Real Install
        run: |
          ansible-playbook task2/playbook.yml \
            -i "${{ env.VM_IP }}," \
            -u ubuntu \
            --private-key ~/.ssh/id_rsa \
            --ssh-common-args='-o StrictHostKeyChecking=no'
