name: "Ansible CI/CD (Task 2)"

on:
  push:
    branches: [ "main" ]
    paths:
      - 'task2/**' 
  workflow_dispatch: 
jobs:
  ansible:
    runs-on: ubuntu-latest

    env:
      GOOGLE_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init

      - name: Get VM IP
        id: get_ip
        working-directory: ./terraform
        run: |
          VM_IP=$(terraform output -raw vm_ip)
          echo "VM_IP=$VM_IP" >> $GITHUB_ENV

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          rm -f ~/.ssh/id_rsa ~/.ssh/known_hosts
          
          # Записуємо ключ через printf для збереження формату
          printf "%s" "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # Створюємо конфіг, який змушує SSH приймати наш ключ
          cat <<EOF > ~/.ssh/config
          Host *
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            IdentitiesOnly yes
            IdentityFile ~/.ssh/id_rsa
            PubkeyAcceptedAlgorithms +ssh-rsa
            HostkeyAlgorithms +ssh-rsa
          EOF

      - name: Ansible Pre-install Check
        working-directory: ./task2
        run: |
          ansible-playbook -i "${{ env.VM_IP }}," -u ubuntu \
            --private-key ~/.ssh/id_rsa \
            --check --diff playbook.yml

      - name: Run Ansible Playbook
        working-directory: ./task2
        run: |
          ansible-playbook -i "${{ env.VM_IP }}," -u ubuntu \
            --private-key ~/.ssh/id_rsa playbook.yml -vvv